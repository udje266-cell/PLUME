# Build iOS SIGNÉ et téléversement automatique sur TestFlight (bêta), sur un
# runner macOS GitHub Actions. Aucun Mac requis de ton côté.
#
# Comme pour l'APK Android, aucun secret Apple n'est stocké dans le dépôt : tout
# passe par les secrets GitHub. Voir docs/IOS_TESTFLIGHT_SETUP.md pour obtenir
# ces valeurs pas à pas.
#
# ── Secrets GitHub à configurer (Settings → Secrets and variables → Actions) ──
#   IOS_DIST_CERT_P12_BASE64   base64 du certificat « Apple Distribution » (.p12)
#   IOS_DIST_CERT_PASSWORD     mot de passe du .p12
#   IOS_TEAM_ID                identifiant d'équipe Apple Developer (10 caractères)
#   ASC_KEY_ID                 App Store Connect API — Key ID
#   ASC_ISSUER_ID              App Store Connect API — Issuer ID
#   ASC_KEY_P8_BASE64          base64 de la clé API .p8 (AuthKey_XXXX.p8)
# (facultatif)
#   IOS_KEYCHAIN_PASSWORD      mot de passe du trousseau temporaire (sinon généré)
#
# ── Variables (facultatif) ────────────────────────────────────────────────────
#   VITE_API_URL, VITE_GOOGLE_CLIENT_ID… (mêmes que le workflow Android)
#
# Onglet Actions → « iOS TestFlight » → Run workflow. Le build apparaît ensuite
# dans App Store Connect → TestFlight (revue bêta légère, puis distribution aux
# testeurs par lien/e-mail).
# ─────────────────────────────────────────────────────────────────────────────

name: iOS TestFlight

on:
  workflow_dispatch:

env:
  BUNDLE_ID: com.plume.app
  SCHEME: App
  XCPROJECT: ios/App/App.xcodeproj

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer les dépendances
        run: npm ci

      - name: Build du bundle web (vers le backend)
        run: npm run build:mobile
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://plume-app-fudd.onrender.com' }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || '163607331655-7ntin1u08u9aa3b2eo01be6mn790rot1.apps.googleusercontent.com' }}

      - name: Synchroniser Capacitor (iOS)
        run: npx cap sync ios

      - name: Sélectionner Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Importer le certificat de distribution dans un trousseau temporaire
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KC_PWD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_B64:-}" ]; then
            echo "::error::Secret IOS_DIST_CERT_P12_BASE64 manquant."; exit 1
          fi
          KC_PWD="${KC_PWD:-ci-temp-$RANDOM$RANDOM}"
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN="$RUNNER_TEMP/plume-signing.keychain-db"

          printf '%s' "$CERT_B64" | tr -d '\r\n\t ' | base64 --decode > "$CERT_PATH" || {
            echo "::error::IOS_DIST_CERT_P12_BASE64 n'est pas un base64 valide."; exit 1; }

          security create-keychain -p "$KC_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PWD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN" || {
            echo "::error::Import du certificat échoué : IOS_DIST_CERT_PASSWORD incorrect ou .p12 corrompu."; exit 1; }
          # Autorise codesign à utiliser la clé sans invite interactive.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PWD" "$KEYCHAIN" >/dev/null
          # Ajoute le trousseau à la liste de recherche (sans retirer le login).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "Certificat importé."

      - name: Déposer la clé API App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_KEY_P8_B64:-}" ]; then
            echo "::error::Secret ASC_KEY_P8_BASE64 manquant."; exit 1
          fi
          # altool et xcodebuild cherchent la clé dans ces dossiers standard.
          mkdir -p "$HOME/.appstoreconnect/private_keys" "$HOME/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_KEY_P8_B64" | tr -d '\r\n\t ' | base64 --decode > "$KEY_PATH" || {
            echo "::error::ASC_KEY_P8_BASE64 n'est pas un base64 valide."; exit 1; }
          cp "$KEY_PATH" "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Générer ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>export</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Archiver l'application
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -project "$XCPROJECT" -scheme "$SCHEME" \
            -sdk iphoneos -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            archive

      - name: Exporter l'IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          ls -la "$RUNNER_TEMP/export"

      - name: Publier l'IPA en artefact
        uses: actions/upload-artifact@v4
        with:
          name: PLUME-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error

      - name: Téléverser sur TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA=$(ls "$RUNNER_TEMP/export/"*.ipa | head -1)
          echo "Téléversement de $IPA vers TestFlight…"
          xcrun altool --upload-app -t ios -f "$IPA" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          echo "Terminé. Le build apparaîtra dans App Store Connect → TestFlight après traitement (quelques minutes)."

      - name: Nettoyer le trousseau
        if: always()
        run: |
          if [ -n "${KEYCHAIN:-}" ] && [ -f "${KEYCHAIN:-}" ]; then
            security delete-keychain "$KEYCHAIN" || true
          fi
