# Build d'un AAB Android SIGNÉ (prêt pour le Play Store), sur GitHub Actions.
#
# Te rend indépendant : tu obtiens l'artefact publiable sans Android Studio ni
# build local. La clé de signature n'est JAMAIS dans le dépôt — elle est fournie
# via des secrets GitHub.
#
# ── À configurer une seule fois ──────────────────────────────────────────────
# 1) Génère un keystore (sur ta machine, garde-le précieusement) :
#      keytool -genkey -v -keystore plume-release.jks -alias plume \
#        -keyalg RSA -keysize 2048 -validity 10000
#    Note bien le mot de passe du store, l'alias et le mot de passe de la clé.
#
# 2) Encode-le en base64 :
#      base64 -w0 plume-release.jks > plume-release.b64      (Linux)
#      base64 -i plume-release.jks  | tr -d '\n' > plume-release.b64   (macOS)
#
# 3) GitHub → Settings → Secrets and variables → Actions → New repository secret :
#      ANDROID_KEYSTORE_BASE64  = contenu de plume-release.b64
#      KEYSTORE_PASSWORD        = mot de passe du store
#      KEY_ALIAS                = plume   (ou ton alias)
#      KEY_PASSWORD             = mot de passe de la clé
#    Et une Variable :  VITE_API_URL = https://plume-app-fudd.onrender.com
#
# 4) Onglet Actions → « Android release (AAB) » → Run workflow.
#    Récupère l'artefact `PLUME-release-aab` → c'est lui qu'on upload sur le
#    Play Store (App bundle).
# ─────────────────────────────────────────────────────────────────────────────

name: Android release (AAB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer les dépendances
        run: npm ci

      - name: Build du bundle web (vers le backend)
        run: npm run build:mobile
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://plume-app-fudd.onrender.com' }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET }}

      - name: Synchroniser Capacitor (Android)
        run: npx cap sync android

      - name: Décoder le keystore depuis les secrets
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/plume-release.jks"

      - name: Build de l'AAB signé (Play Store) et de l'APK signé (installation directe)
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/plume-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Publier l'AAB signé en artefact
        uses: actions/upload-artifact@v4
        with:
          name: PLUME-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # APK signé : s'installe directement sur un téléphone (contrairement à
      # l'AAB) et sa signature release valide ENFIN les App Links (assetlinks).
      - name: Publier l'APK signé en artefact
        uses: actions/upload-artifact@v4
        with:
          name: PLUME-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
