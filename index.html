<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <title>PLUME</title>

    <!-- Favicon = icone de l'appli mobile (plume). Le ?v= force les navigateurs
         a re-telecharger l'icone (ils la mettent en cache tres agressivement). -->
    <link rel="icon" type="image/png" sizes="512x512" href="/plume-icon.png?v=2" />
    <link rel="shortcut icon" type="image/png" href="/plume-icon.png?v=2" />
    <link rel="apple-touch-icon" href="/app-icon.png?v=2" />

    <!-- PWA : installable sur ordinateur, Android et iPhone -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="description" content="PLUME - Plateforme de lecture et d'écriture" />
    <!-- iOS : comportement « app » une fois ajoutée à l'écran d'accueil -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PLUME" />
    <!-- Google Identity Services (bouton officiel « Sign in with Google » sur le web) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
