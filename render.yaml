services:
  - type: web
    name: plume-app
    branch: main
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Base de données EXTERNE gratuite (ex. Neon — sans carte bancaire, sans
      # expiration), car la base gratuite de Render est SUPPRIMEE apres 90 jours.
      # DATABASE_URL = URL "pooled" de Neon (host en ...-pooler.neon.tech),
      # DIRECT_URL   = URL directe (sans -pooler), requise pour les migrations.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://plume-app-fudd.onrender.com # À modifier avec votre URL finale si besoin
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        value: "PLUME <udje266@gmail.com>"
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
      # Optionnel : active la cohérence multi-instances (rate-limit, anti-spam,
      # Socket.io). Laisser vide en mono-instance. Voir SCALING.md.
      - key: REDIS_URL
        sync: false
      # Compte administrateur (re)créé par le seed auto au démarrage. Le seed est
      # idempotent. Définir ADMIN_PASSWORD pour activer cette création.
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: udje266@gmail.com

# NB : plus de base Render ici — le plan gratuit Render supprime la base apres
# 90 jours (perte de donnees). On utilise Neon (gratuit, permanent) a la place.
