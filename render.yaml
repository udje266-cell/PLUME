services:
  - type: web
    name: plume-app
    branch: main
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Runtime (pooler conseillé en multi-instances : voir SCALING.md).
      - key: DATABASE_URL
        fromDatabase:
          name: plume-db
          property: connectionString
      # Migrations : connexion directe (un pooler transaction-mode ne migre pas).
      # En mono-instance c'est la même URL ; en mode pooler, garder celle-ci en
      # direct et pointer DATABASE_URL vers le pooler.
      - key: DIRECT_URL
        fromDatabase:
          name: plume-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://plume-app-fudd.onrender.com # À modifier avec votre URL finale si besoin
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        value: "PLUME <udje266@gmail.com>"
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
      # Optionnel : active la cohérence multi-instances (rate-limit, anti-spam,
      # Socket.io). Laisser vide en mono-instance. Voir SCALING.md.
      - key: REDIS_URL
        sync: false
      # Compte administrateur (re)créé par le seed auto au démarrage. Le seed est
      # idempotent. Définir ADMIN_PASSWORD pour activer cette création.
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: udje266@gmail.com

databases:
  - name: plume-db
    plan: free
